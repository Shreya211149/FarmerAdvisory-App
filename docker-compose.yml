

services:
  mysql:
    image: mysql:8.0
    container_name: krishisalah-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Shreya@2002
      MYSQL_DATABASE: farmer_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: krishisalah-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/farmer_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Shreya@2002
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: shreya-farmeradvisory-secret-key-must-be-very-long-for-security
      JWT_EXPIRATION: 86400000
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: